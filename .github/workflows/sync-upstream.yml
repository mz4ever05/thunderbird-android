name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 6 * * 1'   # Jeden Montag 06:00 UTC
  workflow_dispatch:       # Manuell auslösbar

permissions:
  contents: write

jobs:
  sync:
    name: Merge upstream into main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/thunderbird/thunderbird-android.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream into main
        run: |
          git checkout main
          git merge upstream/main --no-edit \
            -m "chore: sync $(git rev-parse --short upstream/main) upstream commits into main"

      - name: Push to origin
        run: git push origin main
